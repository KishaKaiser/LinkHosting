---
# LinkHosting — main Docker Compose stack
# Run with: docker compose up -d
#
# For development (no root privileges needed):
#   cp .env.example .env
#   DEV_MODE=true docker compose -f docker-compose.yml -f docker-compose.dev.yml up -d

name: linkhosting

x-logging: &default-logging
  driver: "json-file"
  options:
    max-size: "10m"
    max-file: "3"

services:

  # ── Control-plane PostgreSQL ───────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    container_name: lh-db
    restart: unless-stopped
    environment:
      POSTGRES_DB:       ${DB_NAME:-linkhosting}
      POSTGRES_USER:     ${DB_USER:-linkhosting}
      POSTGRES_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD must be set}
    volumes:
      - db_data:/var/lib/postgresql/data
    networks:
      - backend
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-linkhosting}"]
      interval: 10s
      timeout: 5s
      retries: 5
    logging: *default-logging

  # ── Site databases — PostgreSQL ────────────────────────────────────────────
  db-pg:
    image: postgres:16-alpine
    container_name: lh-db-pg
    restart: unless-stopped
    environment:
      POSTGRES_DB:       postgres
      POSTGRES_USER:     ${SITE_DB_USER:-postgres}
      POSTGRES_PASSWORD: ${SITE_DB_PASSWORD:?SITE_DB_PASSWORD must be set}
    volumes:
      - db_pg_data:/var/lib/postgresql/data
    networks:
      - backend
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${SITE_DB_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5
    logging: *default-logging

  # ── Redis (job queue) ──────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: lh-redis
    restart: unless-stopped
    networks:
      - backend
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    logging: *default-logging

  # ── Control Plane (panel + API) ────────────────────────────────────────────
  panel:
    build:
      context: ./control-plane
      dockerfile: Dockerfile
    container_name: lh-panel
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DATABASE_URL:        postgresql://${DB_USER:-linkhosting}:${DB_PASSWORD}@db:5432/${DB_NAME:-linkhosting}
      DOCKER_SOCKET:       unix:///var/run/docker.sock
      DOCKER_NETWORK:      ${COMPOSE_PROJECT_NAME:-linkhosting}_sites
      SITES_BASE_DIR:      /srv/linkhosting/sites
      CERTS_BASE_DIR:      /data/certs
      SFTP_BASE_DIR:       /data/sftp
      PROXY_CONFIG_DIR:    /data/proxy/conf.d
      ADMIN_SECRET_KEY:    ${ADMIN_SECRET_KEY:?ADMIN_SECRET_KEY must be set}
      SESSION_SECRET_KEY:  ${SESSION_SECRET_KEY:?SESSION_SECRET_KEY must be set}
      DOMAIN_SUFFIX:       ${DOMAIN_SUFFIX:-local}
      REDIS_URL:           redis://redis:6379/0
      DEV_MODE:            ${DEV_MODE:-false}
      DNS_ENABLED:         ${DNS_ENABLED:-true}
      HOST_LAN_IP:         ${HOST_LAN_IP:-}
      DNS_HOSTS_FILE:      /data/dns/hosts
      DNS_CONTAINER_NAME:  lh-dns
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - sites_data:/srv/linkhosting/sites
      - certs_data:/data/certs
      - sftp_data:/data/sftp
      - proxy_conf:/data/proxy/conf.d
      - dns_hosts:/data/dns
    networks:
      - backend
      - proxy
    ports:
      - "${PANEL_PORT:-0.0.0.0:8000}:8000"
    logging: *default-logging

  # ── RQ Worker (background deploy jobs) ────────────────────────────────────
  worker:
    build:
      context: ./control-plane
      dockerfile: Dockerfile
    container_name: lh-worker
    restart: unless-stopped
    command: ["rq", "worker", "--url", "redis://redis:6379/0", "deploy"]
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DATABASE_URL:        postgresql://${DB_USER:-linkhosting}:${DB_PASSWORD}@db:5432/${DB_NAME:-linkhosting}
      DOCKER_SOCKET:       unix:///var/run/docker.sock
      SITES_BASE_DIR:      /srv/linkhosting/sites
      CERTS_BASE_DIR:      /data/certs
      PROXY_CONFIG_DIR:    /data/proxy/conf.d
      ADMIN_SECRET_KEY:    ${ADMIN_SECRET_KEY:?ADMIN_SECRET_KEY must be set}
      DOMAIN_SUFFIX:       ${DOMAIN_SUFFIX:-local}
      REDIS_URL:           redis://redis:6379/0
      DEV_MODE:            ${DEV_MODE:-false}
      DNS_ENABLED:         ${DNS_ENABLED:-true}
      HOST_LAN_IP:         ${HOST_LAN_IP:-}
      DNS_HOSTS_FILE:      /data/dns/hosts
      DNS_CONTAINER_NAME:  lh-dns
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - sites_data:/srv/linkhosting/sites
      - proxy_conf:/data/proxy/conf.d
      - dns_hosts:/data/dns
    networks:
      - backend
    logging: *default-logging

  # ── CoreDNS (internal DNS server) ─────────────────────────────────────────
  dns:
    image: coredns/coredns:1.11.3
    container_name: lh-dns
    restart: unless-stopped
    command: ["-conf", "/etc/coredns/Corefile"]
    environment:
      DOMAIN_SUFFIX: ${DOMAIN_SUFFIX:-link}
    volumes:
      - ./dns/Corefile:/etc/coredns/Corefile:ro
      - dns_hosts:/data/dns
    networks:
      - proxy
    ports:
      - "${DNS_LISTEN_ADDR:-0.0.0.0}:53:53/udp"
      - "${DNS_LISTEN_ADDR:-0.0.0.0}:53:53/tcp"
    logging: *default-logging

  # ── Nginx Reverse Proxy ────────────────────────────────────────────────────
  proxy:
    build:
      context: ./proxy
      dockerfile: Dockerfile
    container_name: lh-proxy
    restart: unless-stopped
    depends_on:
      - panel
    volumes:
      - proxy_conf:/etc/nginx/conf.d
      - certs_data:/etc/nginx/certs
    networks:
      - proxy
      - sites
    ports:
      - "80:80"
      - "443:443"
    logging: *default-logging

  # ── SFTP Server ────────────────────────────────────────────────────────────
  sftp-server:
    build:
      context: ./sftp-server
      dockerfile: Dockerfile
    container_name: lh-sftp
    restart: unless-stopped
    volumes:
      - sftp_data:/data/sftp
      - sites_data:/srv/linkhosting/sites
    networks:
      - backend
    ports:
      - "${SFTP_PORT:-2222}:22"
    logging: *default-logging

volumes:
  db_data:
  db_pg_data:
  sites_data:
  certs_data:
  sftp_data:
  proxy_conf:
  dns_hosts:

networks:
  backend:
    driver: bridge
    internal: true
  proxy:
    driver: bridge
    name: linkhosting_proxy
  sites:
    name: ${COMPOSE_PROJECT_NAME:-linkhosting}_sites
    driver: bridge
