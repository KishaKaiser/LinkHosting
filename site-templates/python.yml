---
# Python site template
# Variables: SITE_NAME, SITE_DOMAIN, NETWORK, PYTHON_VERSION (default 3.12), PORT (default 8000)
services:
  site-{{ SITE_NAME }}:
    image: python:{{ PYTHON_VERSION | default('3.12') }}-slim
    container_name: site-{{ SITE_NAME }}
    restart: unless-stopped
    working_dir: /app
    command: ["sh", "-c", "pip install -r requirements.txt && gunicorn app:app -b 0.0.0.0:{{ PORT | default('8000') }}"]
    volumes:
      - /data/sites/{{ SITE_NAME }}:/app:rw
      - /data/certs/{{ SITE_NAME }}:/certs:ro
    environment:
      PORT: "{{ PORT | default('8000') }}"
    networks:
      - {{ NETWORK }}
    labels:
      linkhosting.site: "{{ SITE_NAME }}"
      linkhosting.domain: "{{ SITE_DOMAIN }}"

networks:
  {{ NETWORK }}:
    external: true
