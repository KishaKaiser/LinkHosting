---
# PHP site template (PHP-FPM + Nginx sidecar)
# Variables: SITE_NAME, SITE_DOMAIN, NETWORK, PHP_VERSION (default 8.3)
services:
  site-{{ SITE_NAME }}:
    image: php:{{ PHP_VERSION | default('8.3') }}-fpm-alpine
    container_name: site-{{ SITE_NAME }}-fpm
    restart: unless-stopped
    volumes:
      - /data/sites/{{ SITE_NAME }}:/var/www/html:rw
    networks:
      - {{ NETWORK }}
    labels:
      linkhosting.site: "{{ SITE_NAME }}"

  site-{{ SITE_NAME }}-web:
    image: nginx:alpine
    container_name: site-{{ SITE_NAME }}
    restart: unless-stopped
    depends_on:
      - site-{{ SITE_NAME }}
    volumes:
      - /data/sites/{{ SITE_NAME }}:/var/www/html:ro
      - /data/certs/{{ SITE_NAME }}:/certs:ro
      - ./php-nginx.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - {{ NETWORK }}
    labels:
      linkhosting.site: "{{ SITE_NAME }}"
      linkhosting.domain: "{{ SITE_DOMAIN }}"

networks:
  {{ NETWORK }}:
    external: true
